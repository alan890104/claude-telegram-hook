name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - target: aarch64-apple-darwin
            os: macos-latest
            name: claude-telegram-bridge-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: claude-telegram-bridge-darwin-amd64

          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: claude-telegram-bridge-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: claude-telegram-bridge-linux-arm64

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: claude-telegram-bridge-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux: install system dependencies for tray-icon (GTK3)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Rename binary
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/claude-telegram-bridge ${{ matrix.name }}
          chmod +x ${{ matrix.name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/claude-telegram-bridge.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f -name 'claude-telegram-bridge-*' -exec mv {} . \;
          sha256sum claude-telegram-bridge-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/claude-telegram-bridge-*
            artifacts/checksums.txt
